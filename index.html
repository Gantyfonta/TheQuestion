<!DOCTYPE html>
<html>
<head>
  <title>Daily Opinion</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .option {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.2s;
    }

    .option:hover {
      transform: scale(1.03);
    }

    .bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #00f260, #0575e6);
      width: 0%;
      z-index: 0;
      transition: width 0.5s ease;
    }

    .label {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
    }

    .selected {
      box-shadow: 0 0 15px rgba(0,242,96,0.6);
      border: 1px solid rgba(0,242,96,0.4);
    }
  </style>
</head>
<body>

<div class="card">
  <h1 id="question">Loading...</h1>
  <div class="answers" id="answers"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com";
import { 
  getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot 
} from "https://www.gstatic.com";
import { polls } from "./questions.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGj-pQU6rgyK183jFd2_hWiAXFeAvt73U",
  authDomain: "dailyquestionair.firebaseapp.com",
  projectId: "dailyquestionair",
  storageBucket: "dailyquestionair.firebasestorage.app",
  messagingSenderId: "488248199458",
  appId: "1:488248199458:web:309a797a7a3ddceb4c3d7b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const today = new Date().toISOString().slice(0,10);
const poll = polls[today];
const docRef = doc(db, "polls", today);
const localKey = "vote-" + today;

if (!poll) {
  document.getElementById("question").innerText = "No poll today!";
} else {
  document.getElementById("question").innerText = poll.question;
  
  // 1. Initialize document if it doesn't exist
  const checkInit = async () => {
    const snap = await getDoc(docRef);
    if (!snap.exists()) {
      const initData = {};
      poll.answers.forEach(a => initData[a] = 0);
      await setDoc(docRef, initData);
    }
  };

  // 2. Set up real-time listener
  checkInit().then(() => {
    onSnapshot(docRef, (snap) => {
      if (snap.exists()) {
        renderUI(snap.data());
      }
    });
  });
}

function renderUI(data) {
  // FIX: Only sum the answers we care about to avoid NaN
  const total = poll.answers.reduce((acc, ans) => acc + (data[ans] || 0), 0);
  const container = document.getElementById("answers");
  container.innerHTML = "";

  poll.answers.forEach(answer => {
    const count = data[answer] || 0;
    const percent = total > 0 ? Math.round((count / total) * 100) : 0;

    const div = document.createElement("div");
    div.className = "option";
    if (localStorage.getItem(localKey) === answer) {
      div.classList.add("selected");
    }

    div.onclick = () => vote(answer);

    div.innerHTML = `
      <div class="bar" style="width:${percent}%"></div>
      <div class="label">
        <span>${answer}</span>
        <span>${percent}%</span>
      </div>
    `;
    container.appendChild(div);
  });
}

async function vote(answer) {
  const previous = localStorage.getItem(localKey);
  if (previous === answer) return;

  try {
    if (previous) {
      // Atomic decrement
      await updateDoc(docRef, { [previous]: increment(-1) });
    }
    // Atomic increment
    await updateDoc(docRef, { [answer]: increment(1) });
    localStorage.setItem(localKey, answer);
  } catch (e) {
    console.error("Vote failed: ", e);
    alert("Make sure your Firestore Rules allow updates!");
  }
}
</script>

</body>
</html>
