<!DOCTYPE html>
<html>
<head>
  <title>Daily Opinion</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .option {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.2s;
    }

    .option:hover {
      transform: scale(1.03);
    }

    .bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #00f260, #0575e6);
      width: 0%;
      z-index: 0;
      transition: width 0.5s ease;
    }

    .label {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
    }

    .selected {
      box-shadow: 0 0 15px rgba(0,242,96,0.6);
    }

  </style>
</head>
<body>

<div class="card">
  <h1 id="question"></h1>
  <div class="answers" id="answers"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
import { polls } from "./questions.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGj-pQU6rgyK183jFd2_hWiAXFeAvt73U",
  authDomain: "dailyquestionair.firebaseapp.com",
  projectId: "dailyquestionair",
  storageBucket: "dailyquestionair.firebasestorage.app",
  messagingSenderId: "488248199458",
  appId: "1:488248199458:web:309a797a7a3ddceb4c3d7b",
  measurementId: "G-2XJLX74PMY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
getAnalytics(app);

const today = new Date().toISOString().slice(0,10);
const poll = polls[today];
const docRef = doc(db, "polls", today);
const localKey = "vote-" + today;

if (!poll) {
  document.getElementById("question").innerText = "No poll today!";
} else {
  document.getElementById("question").innerText = poll.question;
  render();
}

async function render() {
  const snap = await getDoc(docRef);

  if (!snap.exists()) {
    const initData = {};
    poll.answers.forEach(a => initData[a] = 0);
    await setDoc(docRef, initData);
  }

  const data = (await getDoc(docRef)).data();
  const total = Object.values(data).reduce((a,b)=>a+b,0);

  const container = document.getElementById("answers");
  container.innerHTML = "";

  poll.answers.forEach(answer => {
    const count = data[answer] || 0;
    const percent = total ? Math.round((count/total)*100) : 0;

    const div = document.createElement("div");
    div.className = "option";
    if (localStorage.getItem(localKey) === answer) {
      div.classList.add("selected");
    }

    div.onclick = () => vote(answer);

    div.innerHTML = `
      <div class="bar" style="width:${percent}%"></div>
      <div class="label">
        <span>${answer}</span>
        <span>${percent}%</span>
      </div>
    `;

    container.appendChild(div);
  });
}

async function vote(answer) {
  const previous = localStorage.getItem(localKey);

  if (previous === answer) return;

  if (previous) {
    await updateDoc(docRef, {
      [previous]: increment(-1)
    });
  }

  await updateDoc(docRef, {
    [answer]: increment(1)
  });

  localStorage.setItem(localKey, answer);
  render();
}

</script>

</body>
</html>
