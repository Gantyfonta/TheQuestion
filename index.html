<!DOCTYPE html>
<html>
<head>
  <title>Daily Opinion</title>
  <script src="questions.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.6s ease;
    }

    h1 {
      margin-bottom: 30px;
      font-weight: 500;
    }

    .answers {
      display: grid;
      gap: 15px;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: 0.2s;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.2);
    }

    .selected {
      background: linear-gradient(90deg, #00f260, #0575e6);
      color: white;
      box-shadow: 0 0 15px rgba(0,242,96,0.6);
    }

    .status {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="card">
  <h1 id="question">Loading...</h1>
  <div class="answers" id="answers"></div>
  <div class="status" id="status"></div>
</div>

<script>
const today = new Date().toISOString().slice(0,10);
const poll = polls[today];
const key = "poll-" + today;

if (!poll) {
  document.getElementById("question").innerText = "No poll today!";
} else {
  document.getElementById("question").innerText = poll.question;
  renderButtons();
}

function getVote() {
  return localStorage.getItem(key);
}

function setVote(ans) {
  localStorage.setItem(key, ans);
  renderButtons();
}

function renderButtons() {
  const div = document.getElementById("answers");
  div.innerHTML = "";

  poll.answers.forEach(ans => {
    let btn = document.createElement("button");
    btn.innerText = ans;

    if (getVote() === ans) {
      btn.classList.add("selected");
    }

    btn.onclick = () => setVote(ans);
    div.appendChild(btn);
  });

  if (getVote()) {
    document.getElementById("status").innerText =
      "Your current vote: " + getVote() + " (click another to change)";
  } else {
    document.getElementById("status").innerText =
      "Select an option to vote";
  }
}
</script>

</body>
</html>
