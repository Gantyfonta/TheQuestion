<!DOCTYPE html>
<html>
<head>
  <title>Daily Opinion Poll</title>
  <script src="questions.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #111;
      color: white;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border: none;
    }

    .selected {
      background: limegreen;
      color: black;
    }
  </style>
</head>

<body>

<h1 id="question"></h1>
<div id="answers"></div>
<h2 id="status"></h2>

<script>
const today = new Date().toISOString().slice(0,10);
const poll = polls[today];
const key = "poll-" + today;

if (!poll) {
  document.getElementById("question").innerText = "No poll today!";
} else {
  document.getElementById("question").innerText = poll.question;
  renderButtons();
}

function getVote() {
  return localStorage.getItem(key);
}

function setVote(ans) {
  localStorage.setItem(key, ans);
  renderButtons();
}

function renderButtons() {
  const div = document.getElementById("answers");
  div.innerHTML = "";

  poll.answers.forEach(ans => {
    let btn = document.createElement("button");
    btn.innerText = ans;

    if (getVote() === ans) {
      btn.classList.add("selected");
    }

    btn.onclick = () => setVote(ans);
    div.appendChild(btn);
  });

  if (getVote()) {
    document.getElementById("status").innerText =
      "Your current vote: " + getVote() + " (click another to change)";
  }
}
</script>

</body>
</html>
