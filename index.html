<!DOCTYPE html>
<html>
<head>
  <title>Daily Opinion</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 20px;
      width: 420px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .option {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: 0.2s;
    }

    .option:hover {
      transform: scale(1.03);
    }

    .bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #00f260, #0575e6);
      width: 0%;
      z-index: 0;
      transition: width 0.5s ease;
    }

    .label {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
    }

    .selected {
      box-shadow: 0 0 15px rgba(0,242,96,0.6);
    }

    #chart-container {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 150px;
      height: 150px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    #chart-container svg {
      width: 100%;
      height: 100%;
    }

  </style>
</head>
<body>

<div class="card">
  <h1 id="question"></h1>
  <div class="answers" id="answers"></div>
</div>

<div id="chart-container">
  <div id="pie-chart"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
import { polls } from "./questions.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGj-pQU6rgyK183jFd2_hWiAXFeAvt73U",
  authDomain: "dailyquestionair.firebaseapp.com",
  projectId: "dailyquestionair",
  storageBucket: "dailyquestionair.firebasestorage.app",
  messagingSenderId: "488248199458",
  appId: "1:488248199458:web:309a797a7a3ddceb4c3d7b",
  measurementId: "G-2XJLX74PMY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

try {
  getAnalytics(app);
} catch (e) {
  console.warn("Analytics failed to initialize:", e);
}

// Use local date string (YYYY-MM-DD) to avoid UTC offset issues
const today = new Date().toLocaleDateString('en-CA');
const poll = polls[today];
const docRef = doc(db, "polls", today);
const localKey = "vote-" + today;

// Unique ID for this visitor to track their specific vote in the database
let visitorId = localStorage.getItem("visitorId");
if (!visitorId) {
  visitorId = "user_" + Math.random().toString(36).substring(2, 15);
  localStorage.setItem("visitorId", visitorId);
}

if (!poll) {
  document.getElementById("question").innerText = "No poll today!";
} else {
  document.getElementById("question").innerText = poll.question;
  
  // Use onSnapshot for real-time updates
  onSnapshot(docRef, async (snap) => {
    if (!snap.exists()) {
      await setDoc(docRef, { votes: {} });
      return;
    }
    const data = snap.data();
    renderUI(data.votes || {});
  }, (err) => {
    console.error("Firestore listener error:", err);
    document.getElementById("question").innerText = "Connection error. Please refresh.";
  });
}

function renderUI(votesMap) {
  // Calculate totals from the votes map
  const counts = {};
  poll.answers.forEach(a => counts[a] = 0);
  
  Object.values(votesMap).forEach(answer => {
    if (counts.hasOwnProperty(answer)) {
      counts[answer]++;
    }
  });

  const total = Object.values(counts).reduce((a, b) => a + b, 0);
  const container = document.getElementById("answers");
  container.innerHTML = "";

  // Get the current user's vote from the database state (source of truth)
  const myVote = votesMap[visitorId];
  if (myVote) {
    localStorage.setItem(localKey, myVote);
  }

  poll.answers.forEach(answer => {
    const count = counts[answer];
    const percent = total ? Math.round((count / total) * 100) : 0;

    const div = document.createElement("div");
    div.className = "option";
    if (myVote === answer) {
      div.classList.add("selected");
    }

    div.onclick = () => vote(answer);

    div.innerHTML = `
      <div class="bar" style="width:${percent}%"></div>
      <div class="label">
        <span>${answer}</span>
        <span>${percent}%</span>
      </div>
    `;

    container.appendChild(div);
  });

  updatePieChart(counts);
}

function updatePieChart(data) {
  const width = 130;
  const height = 130;
  const margin = 5;
  const radius = Math.min(width, height) / 2 - margin;

  const chartDiv = d3.select("#pie-chart");
  chartDiv.selectAll("*").remove();

  const svg = chartDiv
    .append("svg")
    .attr("width", width)
    .attr("height", height)
    .append("g")
    .attr("transform", `translate(${width / 2},${height / 2})`);

  const color = d3.scaleOrdinal()
    .domain(Object.keys(data))
    .range(["#00f260", "#0575e6", "#f27d26", "#ff4444", "#8e9299"]);

  const pie = d3.pie()
    .value(d => d[1])
    .sort(null);

  const data_ready = pie(Object.entries(data));

  const arc = d3.arc()
    .innerRadius(radius * 0.5)
    .outerRadius(radius);

  svg
    .selectAll('allSlices')
    .data(data_ready)
    .enter()
    .append('path')
    .attr('d', arc)
    .attr('fill', d => color(d.data[0]))
    .attr("stroke", "rgba(255,255,255,0.1)")
    .style("stroke-width", "2px")
    .style("opacity", 0.8);
}

async function vote(answer) {
  try {
    // Update only the current user's entry in the votes map
    await updateDoc(docRef, {
      [`votes.${visitorId}`]: answer
    });
    localStorage.setItem(localKey, answer);
  } catch (err) {
    console.error("Vote failed:", err);
  }
}

</script>

</body>
</html>
